name: Container

# manually trigger workflow since it takes very long
on: workflow_dispatch

jobs:
  create-docker-rocky:
    runs-on: systemspurge-dpsim-ci-test-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_SECRET }}

      - name: Build and push
        id: docker_build_dev_rocky
        uses: docker/build-push-action@v5
        with:
         file: packaging/Docker/Dockerfile.dev-rocky
         push: true
         tags: soullessblob/dpsim-ci-test:dev-rocky

  create-docker-fedora-release:
    needs: create-docker-fedora-dev
    runs-on: systemspurge-dpsim-ci-test-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_SECRET }}

      - name: Build and push
        id: docker_build_release
        uses: docker/build-push-action@v5
        with:
         file: packaging/Docker/Dockerfile
         push: true
         tags: soullessblob/dpsim-ci-test:latest

  create-docker-fedora-dev:
    runs-on: systemspurge-dpsim-ci-test-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_SECRET }}

      - name: Build and push
        id: docker_build_dev
        uses: docker/build-push-action@v5
        with:
         file: packaging/Docker/Dockerfile.dev
         push: true
         tags: soullessblob/dpsim-ci-test:dev

  create-docker-fedora-minimal-dev:
    runs-on: systemspurge-dpsim-ci-test-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_SECRET }}

      - name: Build and push
        id: docker_build_dev
        uses: docker/build-push-action@v5
        with:
         file: packaging/Docker/Dockerfile.dev-minimal
         push: true
         tags: soullessblob/dpsim-ci-test:dev-minimal

  create-docker-manylinux:
    runs-on: systemspurge-dpsim-ci-test-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_SECRET }}

      - name: Build and push
        id: docker_build_dev
        uses: docker/build-push-action@v5
        with:
         file: packaging/Docker/Dockerfile.manylinux
         push: true
         tags: soullessblob/dpsim-ci-test:manylinux

  create-docker-binder:
    needs: create-docker-fedora-dev
    runs-on: systemspurge-dpsim-ci-test-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_SECRET }}

      - name: Build and push
        id: docker_build_release
        uses: docker/build-push-action@v5
        with:
         file: .binder/Dockerfile
         push: true
         tags: soullessblob/dpsim-ci-test:binder
